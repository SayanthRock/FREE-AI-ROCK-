name: Android Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create, for example v1.0.2'
        required: true
        default: 'v1.0.2'
      release_name:
        description: 'Release title'
        required: true
        default: 'FREE-AI-ROCK v1.0.2'

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Resolve Release Metadata
        id: release_meta
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
            NAME="${{ inputs.release_name }}"
          else
            TAG="${GITHUB_REF_NAME}"
            NAME="FREE-AI-ROCK ${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"
          echo "Release name: $NAME"

      - name: Print Android SDK environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls "$ANDROID_HOME/platforms" || true
          ls "$ANDROID_HOME/build-tools" || true

      - name: Build Release Bundle and APK
        run: bash -o pipefail -c 'gradle bundleRelease assembleRelease -Pandroid.useAndroidX=true -Pandroid.suppressUnsupportedCompileSdk=35 --no-daemon --warning-mode all --stacktrace 2>&1 | tee android-release-build.log'

      - name: Upload Release Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FREE-AI-ROCK-release-build-log
          path: android-release-build.log
          if-no-files-found: warn

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FREE-AI-ROCK-release-artifacts
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: warn

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/mapping/release/mapping.txt
          generate_release_notes: true
          fail_on_unmatched_files: false
