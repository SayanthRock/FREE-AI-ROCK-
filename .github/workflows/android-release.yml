name: Android Release Build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create, for example v1.0.3'
        required: false
        default: ''
      release_name:
        description: 'Release title'
        required: false
        default: ''

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Resolve Release Metadata
        id: release_meta
        run: |
          set -euo pipefail

          VERSION_NAME="$(grep -E 'versionName = "[^"]+"' app/build.gradle.kts | sed -E 's/.*versionName = "([^"]+)".*/\1/')"
          if [ -z "$VERSION_NAME" ]; then
            echo "::error::Could not read versionName from app/build.gradle.kts"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.release_tag }}" ]; then
            TAG="${{ inputs.release_tag }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v$VERSION_NAME"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.release_name }}" ]; then
            NAME="${{ inputs.release_name }}"
          else
            NAME="FREE-AI-ROCK $TAG"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"
          echo "Release name: $NAME"

      - name: Ensure release tag exists
        run: |
          set -euo pipefail
          TAG="${{ steps.release_meta.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists."
          else
            git tag -a "$TAG" -m "Release $TAG" "${GITHUB_SHA}"
            git push origin "$TAG"
            echo "Created tag $TAG."
          fi

      - name: Print Android SDK environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls "$ANDROID_HOME/platforms" || true
          ls "$ANDROID_HOME/build-tools" || true

      - name: Prepare optional release signing
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${KEYSTORE_BASE64:-}" ] || [ -z "${KEY_ALIAS:-}" ] || [ -z "${STORE_PASSWORD:-}" ] || [ -z "${KEY_PASSWORD:-}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Signing secrets are incomplete. Building unsigned release artifacts."
            exit 0
          fi

          python3 scripts/decode_keystore_secret.py "$KEYSTORE_BASE64" release-keystore.jks

          if ! keytool -list \
            -keystore release-keystore.jks \
            -storepass "$STORE_PASSWORD" \
            -alias "$KEY_ALIAS" >/dev/null 2>&1; then
            echo "::error::Release signing secrets are present but invalid. Run the Keystore Secret Check workflow for details."
            exit 1
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "Release signing is enabled."

      - name: Build Release Bundle and APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          SIGNING_ARGS=()
          if [ "${{ steps.signing.outputs.enabled }}" = "true" ]; then
            SIGNING_ARGS+=("-PFREE_AI_ROCK_STORE_FILE=$PWD/release-keystore.jks")
            SIGNING_ARGS+=("-PFREE_AI_ROCK_STORE_PASSWORD=$STORE_PASSWORD")
            SIGNING_ARGS+=("-PFREE_AI_ROCK_KEY_ALIAS=$KEY_ALIAS")
            SIGNING_ARGS+=("-PFREE_AI_ROCK_KEY_PASSWORD=$KEY_PASSWORD")
          fi

          gradle bundleRelease assembleRelease \
            -Pandroid.useAndroidX=true \
            -Pandroid.suppressUnsupportedCompileSdk=35 \
            --no-daemon \
            --warning-mode all \
            --stacktrace \
            "${SIGNING_ARGS[@]}" 2>&1 | tee android-release-build.log

      - name: Upload Release Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FREE-AI-ROCK-release-build-log
          path: android-release-build.log
          if-no-files-found: warn

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FREE-AI-ROCK-release-artifacts
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: warn

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
            app/build/outputs/mapping/release/mapping.txt
          generate_release_notes: true
          fail_on_unmatched_files: false
