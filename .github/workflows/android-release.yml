name: Android Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build and Sign Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Print Android SDK environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls "$ANDROID_HOME/platforms" || true
          ls "$ANDROID_HOME/build-tools" || true

      - name: Build Release Bundle and APK
        run: bash -o pipefail -c 'gradle bundleRelease assembleRelease -Pandroid.useAndroidX=true -Pandroid.suppressUnsupportedCompileSdk=35 --no-daemon --warning-mode all --stacktrace 2>&1 | tee android-release-build.log'

      - name: Upload Release Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FREE-AI-ROCK-release-build-log
          path: android-release-build.log
          if-no-files-found: warn

      - name: Install Android build tools for signing
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "build-tools;35.0.0"
          ls "$ANDROID_HOME/build-tools/35.0.0"
          echo "$ANDROID_HOME/build-tools/35.0.0" >> "$GITHUB_PATH"

      - name: Validate release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "KEYSTORE_BASE64 secret is missing"
            exit 1
          fi
          if [ -z "${KEY_ALIAS:-}" ]; then
            echo "KEY_ALIAS secret is missing"
            exit 1
          fi
          if [ -z "${STORE_PASSWORD:-}" ]; then
            echo "STORE_PASSWORD secret is missing"
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > release-keystore.jks
          keytool -list -v \
            -keystore release-keystore.jks \
            -storepass "$STORE_PASSWORD" \
            -alias "$KEY_ALIAS" \
            -storetype PKCS12 >/dev/null
          echo "Release keystore decoded and alias validated"

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FREE-AI-ROCK-signed-release
          path: |
            ${{ steps.sign_apk.outputs.signedReleaseFile }}
            ${{ steps.sign_aab.outputs.signedReleaseFile }}
            app/build/outputs/mapping/release/mapping.txt

      - name: Upload R8 Mapping File
        uses: actions/upload-artifact@v4
        with:
          name: FREE-AI-ROCK-r8-mapping
          path: app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.sign_apk.outputs.signedReleaseFile }}
            ${{ steps.sign_aab.outputs.signedReleaseFile }}
            app/build/outputs/mapping/release/mapping.txt
          generate_release_notes: true
