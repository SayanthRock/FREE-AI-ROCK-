name: Keystore Secret Check

on:
  workflow_dispatch:

jobs:
  check:
    name: Validate KEYSTORE_BASE64 Secret
    runs-on: ubuntu-latest

    steps:
      - name: Validate keystore secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "KEYSTORE_BASE64 secret is missing"
            exit 1
          fi

          CLEAN_KEYSTORE_BASE64="$(printf '%s' "$KEYSTORE_BASE64" | tr -d '\r\n\t ')"

          if [ ${#CLEAN_KEYSTORE_BASE64} -lt 100 ]; then
            echo "KEYSTORE_BASE64 is too short. You probably pasted the filename or placeholder text."
            exit 1
          fi

          printf '%s' "$CLEAN_KEYSTORE_BASE64" | base64 --decode > release-keystore.jks

          keytool -list -v \
            -keystore release-keystore.jks \
            -storetype PKCS12 \
            -storepass "$STORE_PASSWORD" \
            -alias "$KEY_ALIAS" >/dev/null

          echo "KEYSTORE_BASE64 decoded successfully. Alias validated."
