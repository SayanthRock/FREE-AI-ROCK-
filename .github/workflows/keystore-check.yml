name: Keystore Secret Check

on:
  workflow_dispatch:

jobs:
  check:
    name: Validate KEYSTORE_BASE64 Secret
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate keystore secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          fail() {
            echo "::error::$1"
            exit 1
          }

          require_secret() {
            local name="$1"
            local value="${!name:-}"
            if [ -z "$value" ]; then
              fail "$name secret is missing. Add it under Settings → Secrets and variables → Actions → Repository secrets."
            fi
          }

          require_secret KEYSTORE_BASE64
          require_secret KEY_ALIAS
          require_secret STORE_PASSWORD
          require_secret KEY_PASSWORD

          python3 scripts/decode_keystore_secret.py "$KEYSTORE_BASE64" release-keystore.jks

          if [ ! -s release-keystore.jks ]; then
            fail "Decoded keystore file is empty."
          fi

          if ! keytool -list \
            -keystore release-keystore.jks \
            -storepass "$STORE_PASSWORD" > keystore-list.txt 2>&1; then
            cat keystore-list.txt
            fail "STORE_PASSWORD is wrong, or KEYSTORE_BASE64 was generated from a different keystore file."
          fi

          if keytool -list -v \
            -keystore release-keystore.jks \
            -storepass "$STORE_PASSWORD" \
            -alias "$KEY_ALIAS" >/dev/null 2>&1; then
            RESOLVED_KEY_ALIAS="$KEY_ALIAS"
          else
            mapfile -t AVAILABLE_ALIASES < <(grep -E '^Alias name:' keystore-list.txt | sed 's/^Alias name: //')

            echo "Configured KEY_ALIAS did not match the keystore."
            echo "Available alias count: ${#AVAILABLE_ALIASES[@]}"

            if [ ${#AVAILABLE_ALIASES[@]} -eq 1 ]; then
              RESOLVED_KEY_ALIAS="${AVAILABLE_ALIASES[0]}"
              echo "Using the only alias found in the keystore: $RESOLVED_KEY_ALIAS"
            elif [ ${#AVAILABLE_ALIASES[@]} -gt 1 ]; then
              echo "Available aliases:"
              printf '  - %s\n' "${AVAILABLE_ALIASES[@]}"
              fail "KEY_ALIAS is wrong. Update the KEY_ALIAS repository secret to one of the aliases above."
            else
              cat keystore-list.txt
              fail "No alias could be read from the keystore. Check the keystore file and STORE_PASSWORD."
            fi
          fi

          echo "KEYSTORE_BASE64 decoded successfully. Alias validated: $RESOLVED_KEY_ALIAS"
