name: Keystore Secret Check

on:
  workflow_dispatch:

jobs:
  check:
    name: Validate KEYSTORE_BASE64 Secret
    runs-on: ubuntu-latest

    steps:
      - name: Validate keystore secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          fail() {
            echo "::error::$1"
            exit 1
          }

          require_secret() {
            local name="$1"
            local value="${!name:-}"
            if [ -z "$value" ]; then
              fail "$name secret is missing. Add it under Settings → Secrets and variables → Actions → Repository secrets."
            fi
          }

          require_secret KEYSTORE_BASE64
          require_secret KEY_ALIAS
          require_secret STORE_PASSWORD
          require_secret KEY_PASSWORD

          if printf '%s' "$KEYSTORE_BASE64" | grep -q '\.\.\.'; then
            fail "KEYSTORE_BASE64 contains placeholder dots (...). Paste the full Base64 text from release-keystore.jks."
          fi

          CLEAN_KEYSTORE_BASE64="$(printf '%s' "$KEYSTORE_BASE64" | sed -e 's/^[[:space:]]*KEYSTORE_BASE64[[:space:]]*[:=][[:space:]]*//' -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          CLEAN_KEYSTORE_BASE64="$(printf '%s' "$CLEAN_KEYSTORE_BASE64" | sed -e "s/^[\"']//" -e "s/[\"']$//")"

          case "$CLEAN_KEYSTORE_BASE64" in
            *,*) CLEAN_KEYSTORE_BASE64="${CLEAN_KEYSTORE_BASE64##*,}" ;;
          esac

          CLEAN_KEYSTORE_BASE64="$(printf '%s' "$CLEAN_KEYSTORE_BASE64" | tr -d '\r\n\t ')"

          if [ ${#CLEAN_KEYSTORE_BASE64} -lt 100 ]; then
            fail "KEYSTORE_BASE64 is too short. You probably pasted a filename, label, or incomplete value."
          fi

          if ! printf '%s' "$CLEAN_KEYSTORE_BASE64" | grep -Eq '^[A-Za-z0-9+/=]+$'; then
            fail "KEYSTORE_BASE64 has invalid characters. Paste only raw Base64 text, with no prompts, labels, quotes, or extra words."
          fi

          case $(( ${#CLEAN_KEYSTORE_BASE64} % 4 )) in
            0) ;;
            2) CLEAN_KEYSTORE_BASE64="${CLEAN_KEYSTORE_BASE64}==" ;;
            3) CLEAN_KEYSTORE_BASE64="${CLEAN_KEYSTORE_BASE64}=" ;;
            *) fail "KEYSTORE_BASE64 length is invalid. Regenerate it with: base64 -w 0 release-keystore.jks" ;;
          esac

          if ! printf '%s' "$CLEAN_KEYSTORE_BASE64" | base64 --decode > release-keystore.jks; then
            fail "KEYSTORE_BASE64 could not be decoded. Regenerate it from the actual release-keystore.jks file."
          fi

          if [ ! -s release-keystore.jks ]; then
            fail "Decoded keystore file is empty."
          fi

          if ! keytool -list -v \
            -keystore release-keystore.jks \
            -storepass "$STORE_PASSWORD" \
            -alias "$KEY_ALIAS" >/dev/null; then
            fail "Keystore decoded, but STORE_PASSWORD or KEY_ALIAS is wrong."
          fi

          echo "KEYSTORE_BASE64 decoded successfully. Alias validated."
