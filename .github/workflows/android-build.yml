name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Print Gradle environment
        run: gradle --version

      - name: Print Android SDK environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls "$ANDROID_HOME/platforms" || true
          ls "$ANDROID_HOME/build-tools" || true

      - name: Build debug APK
        run: bash -o pipefail -c 'gradle assembleDebug --no-daemon --warning-mode all --stacktrace 2>&1 | tee android-build.log'

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FREE-AI-ROCK-build-log
          path: android-build.log
          if-no-files-found: warn

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FREE-AI-ROCK-debug-apk
          path: app/build/outputs/apk/debug/*.apk
